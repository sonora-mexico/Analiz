<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Auditoría X | @chihuahueo1</title>
    <style>
        :root { --primary: #1d9bf0; --dark: #0f1419; --gray: #536471; --bg: #f7f9f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 40px; }
        .card { max-width: 1000px; margin: auto; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e1e8ed; }
        .header { background: var(--dark); color: white; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header p { opacity: 0.8; margin: 10px 0 0; font-size: 14px; }
        .content { padding: 40px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        label { display: block; font-weight: 700; margin-bottom: 12px; color: var(--gray); text-transform: uppercase; font-size: 12px; }
        textarea { width: 100%; height: 180px; border: 2px solid #eff3f4; border-radius: 12px; padding: 15px; font-size: 14px; transition: border 0.3s; resize: none; box-sizing: border-box; }
        textarea:focus { border-color: var(--primary); outline: none; background: #fff; }
        .btn-audit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.2s, background 0.3s; }
        .btn-audit:hover { background: #1a8cd8; transform: translateY(-2px); }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px; }
        .result-stat { background: #fff; border: 1px solid #e1e8ed; border-radius: 12px; padding: 20px; min-height: 200px; }
        .result-stat h3 { border-bottom: 2px solid #eff3f4; padding-bottom: 10px; margin-top: 0; font-size: 16px; display: flex; justify-content: space-between; }
        .count { background: var(--primary); color: white; padding: 2px 10px; border-radius: 10px; font-size: 12px; }
        .user-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .user-item { background: #f0f3f4; padding: 5px 12px; border-radius: 20px; font-size: 13px; color: var(--dark); border: 1px solid #e1e8ed; }
        .danger { border-top: 4px solid #f4212e; }
        .success { border-top: 4px solid #00ba7c; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>SISTEMA DE AUDITORÍA DE AUDIENCIA</h1>
        <p>Análisis de Seguimiento para @chihuahueo1</p>
    </div>
    
    <div class="content">
        <div class="input-group">
            <div>
                <label>Lista de "Siguiendo" (Following)</label>
                <textarea id="listFollowing" placeholder="Pega aquí la lista de usuarios que tú sigues..."></textarea>
            </div>
            <div>
                <label>Lista de "Seguidores" (Followers)</label>
                <textarea id="listFollowers" placeholder="Pega aquí la lista de personas que te siguen..."></textarea>
            </div>
        </div>

        <button class="btn-audit" onclick="ejecutarAuditoria()">EJECUTAR ANÁLISIS PROFESIONAL</button>

        <div class="results-grid">
            <div class="result-stat danger">
                <h3>Cuentas que no te siguen <span id="countNoBack" class="count">0</span></h3>
                <div id="resNoBack" class="user-list"></div>
            </div>
            <div class="result-stat success">
                <h3>Potenciales Clientes / Fans <span id="countFans" class="count">0</span></h3>
                <div id="resFans" class="user-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function extraerUsuarios(texto) {
        return [...new Set(texto.toLowerCase()
            .replace(/@/g, '')
            .split(/[\s,]+/)
            .map(u => u.trim())
            .filter(u => u.length > 0))];
    }

    function ejecutarAuditoria() {
        const following = extraerUsuarios(document.getElementById('listFollowing').value);
        const followers = extraerUsuarios(document.getElementById('listFollowers').value);

        const noTeSiguen = following.filter(u => !followers.includes(u));
        const soloTeSiguen = followers.filter(u => !following.includes(u));

        renderizar('resNoBack', 'countNoBack', noTeSiguen);
        renderizar('resFans', 'countFans', soloTeSiguen);
    }

    function renderizar(containerId, countId, lista) {
        const container = document.getElementById(containerId);
        document.getElementById(countId).textContent = lista.length;
        container.innerHTML = lista.map(u => `<span class="user-item">@${u}</span>`).join('');
        if(lista.length === 0) container.innerHTML = '<p style="color:#999; font-size:13px;">Sin datos detectados.</p>';
    }
</script>

</body>
</html>
